<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이교장의 뉴스레터</title>
    <meta name="description" content="매일 엄선된 유튜브 영상과 인터넷 기사를 오디오 브리핑과 함께 제공하는 데일리 뉴스레터">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- ========== 브랜딩 헤더 ========== -->
    <header id="branding-header">
        <div class="header-bg">
            <img src="assets/header.png" alt="이교장의 뉴스레터 배너">
        </div>
        <div class="header-overlay"></div>
        <div class="header-content">
            <div class="logo-mark">📰</div>
            <h1>이교장의 뉴스레터</h1>
            <p class="header-tagline">매일 아침, 당신에게 꼭 맞는 뉴스 큐레이션</p>
            <div class="header-date" id="today-date"></div>
        </div>
    </header>

    <!-- ========== 데일리 팟캐스트 ========== -->
    <main>
        <section id="podcast-section">
            <div class="section-header">
                <span class="section-icon">🎙️</span>
                <div>
                    <h2>오늘의 팟캐스트</h2>
                    <p class="section-subtitle">5분 오디오 브리핑으로 오늘의 핵심 뉴스를 빠르게 확인하세요</p>
                </div>
            </div>

            <div id="audio-player" class="audio-player">
                <div class="player-info">
                    <div class="player-thumb">
                        <span>🎧</span>
                    </div>
                    <div class="player-meta">
                        <p class="player-title" id="player-title">오늘의 뉴스 브리핑</p>
                        <p class="player-date" id="player-date"></p>
                    </div>
                </div>

                <div class="player-controls">
                    <button id="play-btn" class="play-btn" aria-label="재생/일시정지">
                        <svg id="play-icon" viewBox="0 0 24 24" width="28" height="28" fill="currentColor">
                            <path d="M8 5v14l11-7z"/>
                        </svg>
                        <svg id="pause-icon" viewBox="0 0 24 24" width="28" height="28" fill="currentColor" style="display:none">
                            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                        </svg>
                    </button>

                    <div class="progress-container">
                        <div class="time-display">
                            <span id="current-time">0:00</span>
                            <span id="total-time">5:00</span>
                        </div>
                        <div class="progress-bar" id="progress-bar">
                            <div class="progress-fill" id="progress-fill"></div>
                            <div class="progress-knob" id="progress-knob"></div>
                        </div>
                    </div>
                </div>

                <audio id="audio-element" preload="metadata">
                    <!-- 실제 오디오 파일 경로를 여기에 설정합니다 -->
                    <source src="" type="audio/mpeg">
                </audio>
            </div>
        </section>

        <!-- ========== 큐레이션 갤러리 ========== -->
        <section id="gallery-section">
            <div class="section-header">
                <span class="section-icon">📋</span>
                <div>
                    <h2>오늘의 큐레이션</h2>
                    <p class="section-subtitle">관심도 점수가 높은 순서대로 정렬됩니다</p>
                </div>
            </div>

            <div id="gallery" class="gallery-grid">
                <!-- 카드가 JavaScript로 동적 생성됩니다 -->
            </div>
        </section>
    </main>

    <!-- ========== 푸터 ========== -->
    <footer id="site-footer">
        <p>© 2026 이교장의 뉴스레터 · 매일 최고의 콘텐츠를 전달합니다</p>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
